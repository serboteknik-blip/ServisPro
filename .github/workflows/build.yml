name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: |
          cat > gradlew << 'GRADLEW'
          #!/bin/sh
          exec java -jar "$(dirname "$0")/gradle/wrapper/gradle-wrapper.jar" "$@"
          GRADLEW
          chmod +x gradlew
          curl -sL https://github.com/gradle/gradle/releases/download/v8.4.0/gradle-8.4-bin.zip -o /tmp/g.zip
          unzip -q /tmp/g.zip -d /tmp/g
          /tmp/g/gradle-8.4/bin/gradle wrapper --project-dir . --gradle-version 8.4
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ServisPro-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
